    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #ff006e;
            --secondary: #00d9ff;
            --bg: #0a0e27;
            --card: #1a1f3a;
            --text: #e0e0e0;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        header {
            background: rgba(10, 14, 39, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--primary);
            padding: 1.5rem;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }
        .logo {
            font-size: 2rem;
            font-weight: bold;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .search-box {
            width: 100%;
            max-width: 600px;
            position: relative;

        input {
            width: 100%;

            border: 2px solid var(--secondary);
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(255,0,110,0.3); }
        
        .container { max-width: 1400px; margin: 0 auto; padding: 2rem; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 2rem;
        }
        .card {
            background: var(--card);
            border-radius: 15px;
            overflow: hidden;
            transition: 0.3s;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .card:hover { transform: translateY(-10px); border-color: var(--primary); }
        .poster {
            height: 280px;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
        }
        .info { padding: 1.2rem; flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .title { font-size: 1.1rem; font-weight: 600; margin-bottom: 1rem; line-height: 1.3; }
        .btn {
            background: linear-gradient(to right, var(--primary), var(--secondary));
            color: white;
            text-align: center;
            padding: 0.6rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
        }
        
        #stats { margin-bottom: 2rem; font-size: 1.1rem; color: var(--secondary); font-weight: bold; }
        
        @media (max-width: 600px) {
            .grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 1rem; }
            .poster { height: 200px; font-size: 2.5rem; }
            .title { font-size: 0.9rem; }
        }

        /* Modal Styles */
        .modal {
            display: none; /* Hidden by default */
            position: fixed; /* Stay in place */
            z-index: 1000; /* Sit on top */
            left: 0;
            top: 0;
            width: 100%; /* Full width */
            height: 100%; /* Full height */
            overflow: auto; /* Enable scroll if needed */
            background-color: rgba(0,0,0,0.8); /* Black w/ opacity */
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background-color: var(--bg);
            margin: auto;
            padding: 20px;
            border: 1px solid var(--primary);
            width: 80%;
            max-width: 900px;
            border-radius: 15px;
            position: relative;
        }
        .close-button {
            color: var(--text);
            position: absolute;
            top: 10px;
            right: 20px;
            font-size: 35px;
            font-weight: bold;
            cursor: pointer;
        }
        .close-button:hover, .close-button:focus {
            color: var(--primary);
            text-decoration: none;
            cursor: pointer;
        }
        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            overflow: hidden;
            max-width: 100%;
            background: #000;
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
    </style>
</head>

        const grid = document.getElementById("grid");
        const search = document.getElementById("search");
        const stats = document.getElementById("stats");
        const videoModal = document.getElementById("videoModal");
        const closeButton = document.querySelector(".close-button");
        const videoPlayer = document.getElementById("videoPlayer");
        const modalTitle = document.getElementById("modalTitle");

        function render(items) {
            grid.innerHTML = items.map(m => `
                <div class="card" onclick="openVideoModal('${m.player_url}', '${m.title}')">
                    <div class="poster">🎬</div>
                    <div class="info">
                        <div class="title">${m.title}</div>
                        <button class="btn" onclick="openVideoModal('${m.player_url}', '${m.title}'); event.stopPropagation();">Assistir</button>
                    </div>
                </div>
            `).join('');
            stats.innerText = items.length + ' filmes encontrados';
        }

        search.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = movies.filter(m => m.title.toLowerCase().includes(term.toLowerCase()));
            render(filtered);
        });

        function openVideoModal(playerUrl, title) {
            modalTitle.innerText = title;
            videoPlayer.src = playerUrl;
            videoModal.style.display = "flex";
        }

        closeButton.onclick = function() {
            videoPlayer.src = ""; // Stop video playback
            videoModal.style.display = "none";
        }

        window.onclick = function(event) {
            if (event.target == videoModal) {
                videoPlayer.src = ""; // Stop video playback
                videoModal.style.display = "none";
            }
        }

        render(movies);
