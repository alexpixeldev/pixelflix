    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #ff006e;
            --secondary: #00d9ff;
            --bg: #0a0e27;
            --card: #1a1f3a;
            --text: #e0e0e0;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        header {
            background: rgba(10, 14, 39, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--primary);
            padding: 1.5rem;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }
        .logo {
            font-size: 2rem;
            font-weight: bold;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .search-box {
            width: 100%;
            max-width: 600px;
            position: relative;
        }
        input {
            width: 100%;
            padding: 0.8rem 1rem;
            border-radius: 50px;
            border: 2px solid var(--secondary);
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(255,0,110,0.3); }
        
        .container { max-width: 1400px; margin: 0 auto; padding: 2rem; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 2rem;
        }
        .card {
            background: var(--card);
            border-radius: 15px;
            overflow: hidden;
            transition: 0.3s;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .card:hover { transform: translateY(-10px); border-color: var(--primary); }
        .poster {
            height: 280px;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
        }
        .info { padding: 1.2rem; flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .title { font-size: 1.1rem; font-weight: 600; margin-bottom: 1rem; line-height: 1.3; }
        .btn {
            background: linear-gradient(to right, var(--primary), var(--secondary));
            color: white;
            text-align: center;
            padding: 0.6rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
        }
        
        #stats { margin-bottom: 2rem; font-size: 1.1rem; color: var(--secondary); font-weight: bold; }
        
        @media (max-width: 600px) {
            .grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 1rem; }
            .poster { height: 200px; font-size: 2.5rem; }
            .title { font-size: 0.9rem; }
        }
    </style>
</head>
