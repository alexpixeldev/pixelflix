<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Flix - Catálogo de Filmes</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="logo">Pixel Flix</div>
        <div class="search-box">
            <input type="text" id="search" placeholder="Pesquisar filmes...">
        </div>
    </header>
    
    <div class="container">
        <div id="stats">Carregando filmes...</div>
        <div class="grid" id="grid"></div>
    </div>

    <!-- The Modal -->
    <div id="videoModal" class="modal">
        <!-- Modal content -->
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <div class="modal-title" id="modalTitle"></div>
            <div class="video-container">
                <iframe id="videoPlayer" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
